<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen px-4">
  <h2 class="text-2xl font-bold mb-4">Iniciar sesión</h2>
  <form method="POST" action="/login" class="flex flex-col gap-4 w-11/12 max-w-sm">
    <div>
      <label class="block mb-1">Usuario:</label>
      <input type="text" name="usuario" required class="w-full p-2 text-black rounded" />
    </div>
    <button type="submit" class="bg-blue-500 hover:bg-blue-600 py-2 px-4 rounded">Entrar</button>
  </form>
  <p id="err-cred" class="hidden text-red-500 mt-4">⚠️ Usuario no registrado</p>
  <p id="err-campos" class="hidden text-red-500 mt-2">Rellena el campo usuario</p>
  <p id="err-server" class="hidden text-red-500 mt-2">Error del servidor</p>
  <script>
    const p = new URLSearchParams(location.search);
    const show = id => document.getElementById(id).classList.remove('hidden');
    if (p.get('error') === 'credenciales') show('err-cred');
    if (p.get('error') === 'campos') show('err-campos');
    if (p.get('error') === 'server') show('err-server');
  </script>
</body>
</html>
